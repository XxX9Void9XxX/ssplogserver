<button onclick="openShadow()">Open in about:blank if blocked</button>

<script>
function openShadow() {
  // 1. Open a new blank tab/window
  const win = window.open();

  // 2. Create an iframe in that blank page
  const iframe = win.document.createElement('iframe');
  iframe.src = 'window.location.href';
  iframe.style.width = '100%';
  iframe.style.height = '100%';
  iframe.style.border = 'none';

  // 3. Append the iframe so the page loads inside the blank tab
  win.document.body.style.margin = '0';  // Optional: remove margins
  win.document.body.appendChild(iframe);
}
