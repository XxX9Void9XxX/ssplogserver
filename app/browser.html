<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SSP Browser</title>

<style>
html,body{
  margin:0;
  height:100%;
  background:#000;
  color:#c47fff;
  font-family:Arial,Helvetica,sans-serif;
  overflow:hidden;
  user-select:none;
}
#browser{display:flex;flex-direction:column;height:100%}

/* Tabs */
#tabs{
  display:flex;
  background:#070007;
  padding:5px;
  box-shadow:0 0 15px #7f00ff;
}
.tab{
  display:flex;
  align-items:center;
  gap:6px;
  padding:4px 12px;
  margin-right:5px;
  border-radius:6px;
  cursor:pointer;
  background:#111011;
  color:#c47fff;
  box-shadow:0 0 6px #7f00ff;
  transition: all 0.2s;
}
.tab.active{
  background:linear-gradient(45deg,#7f00ff,#330033);
  color:white;
  box-shadow:0 0 20px #c47fff, 0 0 40px #7f00ff;
}
#addTab{
  padding:4px 12px;
  border-radius:6px;
  background:linear-gradient(45deg,#330033,#7f00ff);
  color:white;
  cursor:pointer;
  box-shadow:0 0 10px #7f00ff;
  transition: all 0.2s;
}

/* Top bar */
#topBar{
  display:flex;
  padding:8px;
  background:#000;
  box-shadow:0 0 15px #7f00ff;
  gap:5px;
}
#topBar input{
  flex:1;
  padding:6px;
  border:none;
  border-radius:5px;
  background:#111011;
  color:#c47fff;
  box-shadow:inset 0 0 5px #7f00ff;
}
button{
  background:linear-gradient(45deg,#330033,#7f00ff);
  border:none;
  color:white;
  padding:6px 10px;
  border-radius:5px;
  cursor:pointer;
  box-shadow:0 0 10px #7f00ff;
  transition: all 0.2s;
}
button:hover{
  box-shadow:0 0 15px #c47fff, 0 0 25px #7f00ff;
}

/* Iframe */
#iframeContainer{
  flex:1;
  position:relative;
}
iframe{
  width:100%;
  height:100%;
  border:none;
  display:none;
  box-shadow:0 0 30px #7f00ff inset;
}
</style>
</head>

<body>

<div id="browser">
  <div id="tabs">
    <div class="tab active" data-id="0">New Tab<span class="close-tab">×</span></div>
    <div id="addTab">＋</div>
  </div>

  <div id="topBar">
    <button id="back">⟵</button>
    <button id="forward">⟶</button>
    <button id="refresh">⟳</button>
    <input id="url" placeholder="Search or enter URL">
    <button id="go">Go</button>
    <button id="fullscreenTab">⛶</button>
  </div>

  <div id="iframeContainer">
    <iframe class="webview" src="/other/browserhome" data-id="0" style="display:block"></iframe>
  </div>
</div>

<script>
const tabsContainer=document.getElementById('tabs');
const addTabBtn=document.getElementById('addTab');
const iframeContainer=document.getElementById('iframeContainer');
const urlInput=document.getElementById('url');
const fullscreenBtn=document.getElementById('fullscreenTab');

let tabCount=1;
let currentTab=0;

let tabs=[{
  id:0,
  iframe:document.querySelector('.webview'),
  tabDiv:document.querySelector('.tab')
}];

const homeURL = "https://sspv2play.neocities.org/browserhome";

function createTab(url=homeURL){
  const id=tabCount++;
  const iframe=document.createElement('iframe');
  iframe.className='webview';
  iframe.dataset.id=id;
  iframe.src=url;
  iframeContainer.appendChild(iframe);

  const tabDiv=document.createElement('div');
  tabDiv.className='tab';
  tabDiv.dataset.id=id;
  tabDiv.innerHTML='New Tab <span class="close-tab">×</span>';
  tabsContainer.insertBefore(tabDiv, addTabBtn);

  tabs.push({id,iframe,tabDiv});
  setActiveTab(id);
}

function setActiveTab(id){
  tabs.forEach(t=>{
    t.iframe.style.display='none';
    t.tabDiv.classList.remove('active');
  });
  const active=tabs.find(t=>t.id===id);
  active.iframe.style.display='block';
  active.tabDiv.classList.add('active');
  currentTab=id;

  // Hide URL if home page, else show it
  if(active.iframe.src === homeURL){
    urlInput.value = "";
  } else {
    urlInput.value = active.iframe.src;
  }
}

function openURL(url){
  const active=tabs.find(t=>t.id===currentTab);
  active.iframe.src=url;
  urlInput.value = url === homeURL ? "" : url;
}

/* Yahoo Search */
document.getElementById("go").onclick = ()=>{
  const q=urlInput.value.trim();
  if(q.startsWith("http")) openURL(q);
  else openURL("https://search.yahoo.com/search?p="+encodeURIComponent(q));
};

/* Navigation buttons */
document.getElementById("refresh").onclick = ()=>{
  tabs.find(t=>t.id===currentTab).iframe.src=tabs.find(t=>t.id===currentTab).iframe.src;
};
document.getElementById("back").onclick = ()=>{
  try{tabs.find(t=>t.id===currentTab).iframe.contentWindow.history.back();}catch{}
};
document.getElementById("forward").onclick = ()=>{
  try{tabs.find(t=>t.id===currentTab).iframe.contentWindow.history.forward();}catch{}
};

/* Fullscreen using Fullscreen API */
fullscreenBtn.onclick = ()=>{
  const container = document.getElementById('iframeContainer');
  if(!document.fullscreenElement){
    container.requestFullscreen().catch(err=>{
      alert("Fullscreen failed: " + err.message);
    });
  }else{
    document.exitFullscreen();
  }
};

addTabBtn.onclick = ()=>createTab();

tabsContainer.addEventListener('click', e=>{
  const tab = e.target.closest('.tab');
  if(!tab) return;
  const id = parseInt(tab.dataset.id);
  if(e.target.classList.contains('close-tab')){
    const tabObj = tabs.find(t=>t.id===id);
    tabObj.iframe.remove();
    tabObj.tabDiv.remove();
    tabs = tabs.filter(t=>t.id!==id);
    if(tabs.length>0) setActiveTab(tabs[tabs.length-1].id);
    else createTab();
  }else{
    setActiveTab(id);
  }
});
</script>

</body>
</html>
