<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Background Remover</title>
  <link rel="icon" href="https://shadowsitesplus.neocities.org/SSP.png" type="image/x-icon">
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background-color: black; color: #fff; text-align: center; }
    #topBar {
      position: fixed;
      top: 0; left: 0; width: 100%;
      background-color: #000;
      padding: 10px 0;
      z-index: 1000;
      box-shadow: 0 0 20px #9b59b6;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }
    #topBar h1 {
      font-size: 1.5rem;
      margin: 0 20px;
      color: #e0c3fc;
      text-shadow: 0 0 5px #9b59b6, 0 0 10px #8e44ad;
      animation: pulse 2s infinite alternate;
    }
    #topBar a, #topBar .glow-button {
      margin: 0 10px;
      text-decoration: none;
      font-weight: bold;
      color: #e0c3fc;
      cursor: pointer;
      text-shadow: 0 0 5px #9b59b6, 0 0 10px #8e44ad;
      transition: 0.3s;
      animation: pulse 2s infinite alternate;
    }
    #topBar a:hover, #topBar .glow-button:hover {
      text-shadow: 0 0 20px #d580ff, 0 0 30px #9b59b6;
    }
    .glow-button {
      padding: 8px 20px;
      border-radius: 8px;
      border: 2px solid #9b59b6;
      background: linear-gradient(45deg, #9b59b6, #8e44ad);
      box-shadow: 0 0 10px #9b59b6, 0 0 20px #8e44ad;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      text-shadow: 0 0 5px #9b59b6, 0 0 10px #8e44ad;
      transition: 0.3s;
      animation: pulse 2s infinite alternate;
    }
    .glow-button:hover {
      text-shadow: 0 0 20px #d580ff, 0 0 30px #9b59b6;
    }
    #mainContent { margin-top: 120px; }
    h2 {
      font-size: 1.8rem;
      margin: 10px 0;
      color: #e0c3fc;
      text-shadow: 0 0 5px #9b59b6, 0 0 10px #8e44ad;
      animation: pulse 2s infinite alternate;
    }
    @keyframes pulse {
      0% { text-shadow: 0 0 5px #9b59b6, 0 0 10px #8e44ad; }
      50% { text-shadow: 0 0 15px #d580ff, 0 0 25px #9b59b6; }
      100% { text-shadow: 0 0 5px #9b59b6, 0 0 10px #8e44ad; }
    }
    #clock {
      position: fixed;
      top: 10px; right: 20px;
      font-size: 1rem;
      color: #a020f0;
      text-shadow: 0 0 3px rgba(160,32,240,0.8), 0 0 6px rgba(160,32,240,0.6);
      z-index: 2000;
      background: rgba(0,0,0,0.5);
      padding: 3px 6px;
      border-radius: 5px;
    }
    #uploader {
      margin-top: 20px;
    }
    #previewContainer, #outputContainer {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 20px;
    }
    img {
      max-width: 90%;
      border-radius: 12px;
      box-shadow: 0 0 20px #9b59b6, 0 0 40px #8e44ad;
      margin-bottom: 10px;
    }
    #previewImage, #outputImage { display: none; }
    #downloadBtn { display: none; }
    input[type="file"] { display: none; }
  </style>
</head>
<body>
  <div id="topBar">
    <h1>Background Remover</h1>
  </div>

  <div id="mainContent">
    <h2>Upload an image to preview and remove its background</h2>
    <div id="uploader">
      <label for="imageInput" class="glow-button">Choose Image</label>
      <input type="file" id="imageInput" accept="image/*">
      <button class="glow-button" id="removeBtn">Remove Background</button>
    </div>

    <div id="previewContainer">
      <img id="previewImage" alt="Preview Image">
    </div>

    <div id="outputContainer">
      <img id="outputImage" alt="Result Image">
      <a id="downloadBtn" class="glow-button" download="image.html">Download Image</a>
    </div>
  </div>

  <div id="clock">Welcome to Shadow Sites Plus</div>

  <script>
    // Clock
    (function() {
      const clockEl = document.getElementById('clock');
      function updateClock() {
        const now = new Date();
        let hours = now.getHours();
        const minutes = String(now.getMinutes()).padStart(2, '0');
        const seconds = String(now.getSeconds()).padStart(2, '0');
        const ampm = hours >= 12 ? 'PM' : 'AM';
        hours = hours % 12 || 12;
        clockEl.textContent = `${hours}:${minutes}:${seconds} ${ampm}`;
      }
      setInterval(updateClock, 1000);
      updateClock();
    })();

    // Elements
    const imageInput = document.getElementById('imageInput');
    const previewImage = document.getElementById('previewImage');
    const removeBtn = document.getElementById('removeBtn');
    const outputImage = document.getElementById('outputImage');
    const downloadBtn = document.getElementById('downloadBtn');

    // Preview selected image
    imageInput.addEventListener('change', () => {
      const file = imageInput.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        previewImage.src = e.target.result;
        previewImage.style.display = "block";
        outputImage.style.display = "none";
        downloadBtn.style.display = "none";
      };
      reader.readAsDataURL(file);
    });

    // Remove.bg API call
    removeBtn.addEventListener('click', () => {
      if (!imageInput.files[0]) {
        alert("Please select an image first!");
        return;
      }

      const file = imageInput.files[0];
      const formData = new FormData();
      formData.append("image_file", file);
      formData.append("size", "auto");

      fetch("https://api.remove.bg/v1.0/removebg", {
        method: "POST",
        headers: {
          "X-Api-Key": "6BVXeLBoK8X3r2xJ8J1KzZiz" // Replace with your API key
        },
        body: formData
      })
      .then(response => {
        if (!response.ok) throw new Error("Failed to remove background. Check API key or limits.");
        return response.blob();
      })
      .then(blob => {
        const url = URL.createObjectURL(blob);
        outputImage.src = url;
        outputImage.style.display = "block";

        // Hide preview image
        previewImage.style.display = "none";

        // Prepare downloadable HTML file
        const htmlContent = `
<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Transparent Image</title></head>
<body style="background: transparent; display:flex; justify-content:center; align-items:center; height:100vh;">
<img src="${url}" alt="Transparent Image">
</body>
</html>`;
        const blobHtml = new Blob([htmlContent], { type: "text/html" });
        downloadBtn.href = URL.createObjectURL(blobHtml);
        downloadBtn.style.display = "inline-block";
      })
      .catch(err => alert(err));
    });
  </script>
</body>
</html>
<script>
alert("Tool by remove.bg");
</script>
