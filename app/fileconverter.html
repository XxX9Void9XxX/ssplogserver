<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>File Converter</title>
<link rel="icon" href="https://shadowsitesplus.neocities.org/SSP.png" type="image/x-icon">
<style>
  :root{--glow1:#9b59b6;--glow2:#8e44ad;--accent:#e0c3fc;--bg:#000}
  html,body{height:100%;margin:0;background:var(--bg);color:#fff;font-family:Arial,sans-serif;text-align:center}
  #topBar{position:fixed;top:0;left:0;width:100%;background:#000;padding:10px 0;z-index:1000;box-shadow:0 0 20px var(--glow1);display:flex;justify-content:center;align-items:center;flex-wrap:wrap}
  #topBar h1{margin:0 20px;color:var(--accent);font-size:1.4rem;text-shadow:0 0 5px var(--glow1),0 0 10px var(--glow2);animation:pulse 2s infinite alternate}
  @keyframes pulse{0%{text-shadow:0 0 5px var(--glow1),0 0 10px var(--glow2)}50%{text-shadow:0 0 15px #d580ff,0 0 25px var(--glow1)}100%{text-shadow:0 0 5px var(--glow1),0 0 10px var(--glow2)}}
  #clock{position:fixed;top:10px;right:20px;font-size:1rem;color:#a020f0;text-shadow:0 0 3px rgba(160,32,240,0.8),0 0 6px rgba(160,32,240,0.6);z-index:2000;background:rgba(0,0,0,0.45);padding:3px 6px;border-radius:5px}
  #mainContent{margin-top:120px;padding:30px;max-width:1100px;margin-left:auto;margin-right:auto}
  h2{font-size:1.6rem;margin:6px 0;color:var(--accent);text-shadow:0 0 5px var(--glow1),0 0 10px var(--glow2);animation:pulse 2s infinite alternate}
  .glow-button{display:inline-block;padding:8px 18px;border-radius:8px;border:2px solid var(--glow1);background:linear-gradient(45deg,var(--glow1),var(--glow2));color:var(--accent);text-shadow:0 0 5px var(--glow1),0 0 10px var(--glow2);cursor:pointer;margin:8px;font-weight:700;font-size:15px;transition:transform .08s ease}
  .glow-button:active{transform:translateY(1px)} .glow-button:hover{text-shadow:0 0 20px #d580ff,0 0 30px var(--glow1)}
  input[type="text"], select{margin:8px;padding:10px 12px;border-radius:8px;border:2px solid var(--glow1);background:#111;color:var(--accent);font-size:14px}
  input[type="text"]:focus, select:focus{outline:none;border-color:#d580ff}
  input[type="file"]{display:none}
  #chosenFile{display:block;margin-top:8px;color:#ddd;font-size:13px}
  #imagePreview{max-width:360px;margin-top:18px;border-radius:12px;border:2px solid var(--glow1);box-shadow:0 0 20px var(--glow1),0 0 40px var(--glow2);display:none}
  @media (max-width:520px){.glow-button{padding:8px 12px;font-size:14px} #imagePreview{max-width:90%}}
  .muted{color:#bbb;font-size:13px;margin-top:6px}
</style>
</head>
<body>
  <div id="clock">Welcome to Shadow Sites Plus</div>

  <div id="topBar"><h1>File Converter</h1></div>

  <div id="mainContent">


    <label for="fileInput" class="glow-button" id="chooseLabel">Choose File</label>
    <input id="fileInput" type="file" />

    <div id="chosenFile" aria-live="polite">No file chosen</div>

    <div style="margin-top:14px;">
      <label for="extSelect" class="muted">Choose output extension:</label>
      <select id="extSelect" title="Choose extension" style="width:68%;max-width:720px">
        <!-- Common text / web / dev -->
        <option value=".txt">.txt — Text</option>
        <option value=".md">.md — Markdown</option>
        <option value=".html">.html — Webpage</option>
        <option value=".css">.css — Stylesheet</option>
        <option value=".json">.json — JSON</option>
        <option value=".xml">.xml — XML</option>
        <option value=".csv">.csv — CSV</option>

        <!-- Programming / scripts -->
        <option value=".js">.js — JavaScript</option>
        <option value=".ts">.ts — TypeScript</option>
        <option value=".py">.py — Python</option>
        <option value=".java">.java — Java</option>
        <option value=".c">.c — C</option>
        <option value=".cpp">.cpp — C++</option>
        <option value=".cs">.cs — C#</option>
        <option value=".go">.go — Go</option>
        <option value=".rb">.rb — Ruby</option>
        <option value=".php">.php — PHP</option>
        <option value=".rs">.rs — Rust</option>
        <option value=".swift">.swift — Swift</option>
        <option value=".kt">.kt — Kotlin</option>
        <option value=".sh">.sh — Shell script</option>
        <option value=".bat">.bat — Batch</option>
        <option value=".ps1">.ps1 — PowerShell</option>

        <!-- Office -->
        <option value=".docx">.docx — Word</option>
        <option value=".xlsx">.xlsx — Excel</option>
        <option value=".pptx">.pptx — PowerPoint</option>
        <option value=".odt">.odt — OpenDocument Text</option>
        <option value=".ods">.ods — OpenDocument Sheet</option>
        <option value=".odp">.odp — OpenDocument Presentation</option>

        <!-- Fonts -->
        <option value=".ttf">.ttf — TrueType Font</option>
        <option value=".otf">.otf — OpenType Font</option>
        <option value=".woff">.woff — Web Open Font</option>
        <option value=".woff2">.woff2 — Web Open Font 2</option>

        <!-- Images -->
        <option value=".png">.png — PNG</option>
        <option value=".jpg">.jpg — JPG</option>
        <option value=".jpeg">.jpeg — JPEG</option>
        <option value=".gif">.gif — GIF</option>
        <option value=".webp">.webp — WEBP</option>
        <option value=".svg">.svg — Vector (SVG)</option>
        <option value=".ico">.ico — Icon</option>
        <option value=".heic">.heic — HEIC</option>
        <option value=".psd">.psd — Photoshop</option>
        <option value=".xcf">.xcf — GIMP</option>

        <!-- Audio / Video -->
        <option value=".mp3">.mp3 — MP3</option>
        <option value=".wav">.wav — WAV</option>
        <option value=".flac">.flac — FLAC</option>
        <option value=".ogg">.ogg — OGG</option>
        <option value=".aac">.aac — AAC</option>
        <option value=".m4a">.m4a — M4A</option>
        <option value=".mp4">.mp4 — MP4</option>
        <option value=".mkv">.mkv — MKV</option>

        <!-- Archives / compressed -->
        <option value=".zip">.zip — ZIP</option>
        <option value=".7z">.7z — 7-Zip</option>
        <option value=".rar">.rar — RAR</option>
        <option value=".tar">.tar — TAR</option>
        <option value=".gz">.gz — GZIP</option>
        <option value=".tar.gz">.tar.gz — TAR.GZ</option>
        <option value=".bz2">.bz2 — BZIP2</option>
        <option value=".xz">.xz — XZ</option>

        <!-- Executables / installers / libraries -->
        <option value=".exe">.exe — Windows EXE</option>
        <option value=".msi">.msi — Windows Installer</option>
        <option value=".dll">.dll — Windows DLL</option>
        <option value=".apk">.apk — Android Package</option>
        <option value=".dmg">.dmg — macOS Disk Image</option>
        <option value=".deb">.deb — Debian Package</option>
        <option value=".rpm">.rpm — RPM Package</option>
        <option value=".so">.so — Unix Shared Object</option>
        <option value=".jar">.jar — Java JAR</option>

        <!-- Disc / virtual disk -->
        <option value=".iso">.iso — Disc image</option>
        <option value=".vmdk">.vmdk — VMware disk</option>
        <option value=".vdi">.vdi — VirtualBox disk</option>
        <option value=".qcow2">.qcow2 — QEMU disk</option>

        <!-- Databases / data -->
        <option value=".db">.db — Database</option>
        <option value=".sqlite">.sqlite — SQLite</option>
        <option value=".sql">.sql — SQL dump</option>
        <option value=".bak">.bak — Backup</option>

        <!-- Ebooks -->
        <option value=".epub">.epub — EPUB</option>
        <option value=".mobi">.mobi — MOBI</option>
        <option value=".azw3">.azw3 — Kindle</option>

        <!-- 3D / models -->
        <option value=".obj">.obj — 3D OBJ</option>
        <option value=".fbx">.fbx — 3D FBX</option>
        <option value=".blend">.blend — Blender</option>

        <!-- Game / mod / map / save -->
        <option value=".pak">.pak — Game package</option>
        <option value=".wad">.wad — Doom WAD</option>
        <option value=".bsp">.bsp — Map (Source/Quake)</option>
        <option value=".map">.map — Map file</option>
        <option value=".sav">.sav — Save file</option>

        <!-- Certificates / keys -->
        <option value=".pem">.pem — PEM cert</option>
        <option value=".crt">.crt — Certificate</option>
        <option value=".key">.key — Private key</option>
        <option value=".pfx">.pfx — PKCS#12</option>

        <!-- Minecraft-specific (already included earlier but repeated for completeness) -->
        <option value=".mcworld">.mcworld — Minecraft World</option>
        <option value=".mcpack">.mcpack — Minecraft Pack</option>
        <option value=".mcmeta">.mcmeta — Minecraft Metadata</option>
        <option value=".mca">.mca — Anvil Region</option>
        <option value=".nbt">.nbt — Named Binary Tag</option>
        <option value=".schematic">.schematic — Classic Schematic</option>
        <option value=".schem">.schem — New Schematic</option>
        <option value=".dat">.dat — level.dat / data</option>
        <option value=".mcfunction">.mcfunction — Minecraft function file</option>

        <!-- Misc / developer -->
        <option value=".wasm">.wasm — WebAssembly</option>
        <option value=".log">.log — Log file</option>
        <option value=".ini">.ini — INI config</option>
        <option value=".cfg">.cfg — Config</option>
        <option value=".env">.env — Environment file</option>
        <option value=".yml">.yml — YAML</option>
        <option value=".yaml">.yaml — YAML</option>

        <!-- Custom -->
        <option value="custom">Custom (use output filename field)</option>
      </select>
    </div>

    <div style="margin-top:12px;">
      <input type="text" id="outputName" placeholder="Output filename (e.g. myworld.mcworld)" style="width:320px" />
      <button class="glow-button" id="convertBtn">Convert & Download</button>
    </div>

    <img id="imagePreview" alt="Image preview">
  </div>

<script>
  (function(){
    const el=document.getElementById('clock');
    function update(){const n=new Date();let h=n.getHours(),m=String(n.getMinutes()).padStart(2,'0'),s=String(n.getSeconds()).padStart(2,'0');const a=h>=12?'PM':'AM';h=h%12||12;el.textContent=`${h}:${m}:${s} ${a}`;}
    setInterval(update,1000);update();
  })();

  const fileInput=document.getElementById('fileInput');
  const chooseLabel=document.getElementById('chooseLabel');
  const chosenFile=document.getElementById('chosenFile');
  const extSelect=document.getElementById('extSelect');
  const outputName=document.getElementById('outputName');
  const convertBtn=document.getElementById('convertBtn');
  const imagePreview=document.getElementById('imagePreview');

  fileInput.addEventListener('change',()=>{
    const f=fileInput.files[0];
    if(!f){chosenFile.textContent='No file chosen'; imagePreview.style.display='none'; return;}
    chosenFile.textContent=`Selected: ${f.name} — ${Math.round(f.size/1024)} KB`;
    if(!outputName.value.trim()){
      const base=f.name.replace(/\.[^/.]+$/,'');
      const ext=extSelect.value==='custom' ? (f.name.includes('.')? f.name.slice(f.name.lastIndexOf('.')) : '') : extSelect.value;
      outputName.value = base + (ext||'');
    }
    if(f.type && f.type.startsWith('image/')){ const r=new FileReader(); r.onload=(ev)=>{ imagePreview.src=ev.target.result; imagePreview.style.display='block'; } ; r.readAsDataURL(f); }
    else {
      const name=f.name.toLowerCase();
      if(name.match(/\.(png|jpg|jpeg|gif|webp|svg|ico|heic)$/)) { const r=new FileReader(); r.onload=(ev)=>{ imagePreview.src=ev.target.result; imagePreview.style.display='block'; }; r.readAsDataURL(f); }
      else { imagePreview.style.display='none'; }
    }
  });

  extSelect.addEventListener('change',()=>{
    const sel=extSelect.value;
    if(sel==='custom') return;
    let name=outputName.value.trim();
    if(!name && fileInput.files[0]) { const base=fileInput.files[0].name.replace(/\.[^/.]+$/,''); name=base+sel; }
    else if(name) { if(name.includes('.')) name = name.replace(/\.[^/.]+$/, sel); else name = name + sel; }
    outputName.value = name;
  });

  convertBtn.addEventListener('click', async ()=>{
    const f=fileInput.files[0];
    if(!f){ alert('Select a file first!'); return; }
    let outName=outputName.value.trim();
    if(!outName){ const base=f.name.replace(/\.[^/.]+$/,''); outName = base + (extSelect.value==='custom' ? (f.name.includes('.')? f.name.slice(f.name.lastIndexOf('.')) : '') : extSelect.value); }
    try {
      const arrayBuffer = await f.arrayBuffer();
      const blob = new Blob([arrayBuffer], { type: f.type || 'application/octet-stream' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = outName;
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    } catch(err){ console.error(err); alert('Error converting file: '+err.message); }
  });

  chooseLabel.addEventListener('keydown',(e)=>{ if(e.key==='Enter' || e.key===' ') fileInput.click(); });
</script>
</body>
</html>
<script>
alert("Originally made by me");
</script>
