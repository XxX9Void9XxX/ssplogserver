<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shadow Sites Plus</title>
<link rel="icon" href="SSP.png" type="image/x-icon">
<style>
:root { --glow-color: #9b59b6; }

body { margin:0; font-family:Arial,Helvetica,sans-serif; background:black; color:white; overflow:hidden; text-align:center; position:relative; user-select:none; }
img { -webkit-user-drag: none; user-drag: none; user-select: none; }

/* --- ADMIN DASHBOARD --- */
#adminDashboard {
    display: none; position: fixed; top: 70px; left: 0; width: 100vw; height: calc(100vh - 70px);
    background: #0a0a0a; z-index: 8000; overflow-y: auto; padding: 40px; box-sizing: border-box;
}
#adminDashboard h1 { color: #ff4d4d; text-shadow: 0 0 15px #ff4d4d; margin-bottom: 30px; }
.adminTable { width: 100%; max-width: 1000px; margin: 0 auto; border-collapse: collapse; background: #111; box-shadow: 0 0 15px var(--glow-color); border-radius: 10px; overflow: hidden; }
.adminTable th, .adminTable td { padding: 15px; border-bottom: 1px solid #333; text-align: left; }
.adminTable th { background: #222; color: #e0c3fc; }
.adminTable tr:hover { background: #1a1a1a; }
.statusBadge { padding: 5px 10px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; }
.online { background: #28a745; color: white; }
.offline { background: #6c757d; color: white; }
.adminActionBtn { padding: 8px 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; margin-right: 5px; transition: 0.2s; }
.btn-approve { background: #28a745; color: white; }
.btn-approve:hover { background: #218838; box-shadow: 0 0 10px #28a745; }
.btn-ban { background: #dc3545; color: white; }
.btn-ban:hover { background: #c82333; box-shadow: 0 0 10px #dc3545; }
.btn-unban { background: #ffc107; color: black; }
.btn-unban:hover { background: #e0a800; box-shadow: 0 0 10px #ffc107; }

/* --- AUTHENTICATION OVERLAY --- */
#authOverlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); z-index: 9999; display: flex; justify-content: center; align-items: center; }
#authBox { background: #111; border: 2px solid var(--glow-color); border-radius: 15px; padding: 40px; width: 320px; box-shadow: 0 0 30px var(--glow-color); text-align: center; animation: glowPulse 2s infinite alternate; }
#authBox h2 { color: #e0c3fc; text-shadow: 0 0 10px var(--glow-color); margin-top: 0; margin-bottom: 20px; }
#authMessage { color: #d580ff; font-weight: bold; margin-bottom: 15px; text-shadow: 0 0 5px var(--glow-color); min-height: 20px; }
.authInput { width: 90%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 2px solid var(--glow-color); background: #000; color: #e0c3fc; outline: none; box-shadow: inset 0 0 5px var(--glow-color); transition: 0.3s; }
.authInput:focus { box-shadow: 0 0 15px var(--glow-color), inset 0 0 10px var(--glow-color); }
.authBtn { width: 100%; padding: 12px; background: transparent; border: 2px solid var(--glow-color); color: #e0c3fc; font-weight: bold; font-size: 1rem; border-radius: 8px; cursor: pointer; transition: 0.3s; text-shadow: 0 0 5px var(--glow-color); }
.authBtn:hover { background: var(--glow-color); color: white; box-shadow: 0 0 20px var(--glow-color); }
.toggleAuth { margin-top: 15px; font-size: 0.9rem; color: #a020f0; cursor: pointer; text-decoration: underline; transition: 0.2s; }
.toggleAuth:hover { color: #e0c3fc; text-shadow: 0 0 10px var(--glow-color); }

#particleCanvas { position:fixed; top:0; left:0; width:100vw; height:100vh; pointer-events:none; z-index:0; }
#topBar { position:fixed; top:0; left:0; width:100%; height:70px; background:black; z-index:1000; box-shadow:0 0 20px var(--glow-color); display:flex; align-items:center; justify-content:center; gap:20px; }
#topBar h1 { margin:0; font-size:1.5rem; color:#e0c3fc; text-shadow:0 0 10px var(--glow-color); animation:pulseText 2s infinite alternate; cursor:pointer; user-select:none; }
#topBar a { cursor:pointer; font-weight:bold; background:none; border:none; color:#e0c3fc; text-decoration:none; text-shadow:0 0 8px var(--glow-color); transition:0.2s; user-select:none; }
#topBar a:hover { color:#fff; text-shadow:0 0 15px var(--glow-color); }
#clock { position:fixed; bottom:20px; right:20px; font-size:1rem; color:#a020f0; background:rgba(0,0,0,0.7); padding:6px 10px; border-radius:6px; z-index:2000; box-shadow:0 0 10px var(--glow-color); }
#mainContent { position:absolute; top:70px; left:0; width:100%; height:calc(100vh - 70px); overflow:hidden; z-index:1; }
#homeContent { margin-top:40px; z-index:2; position:relative; user-select:none; }
#homeContent h2 { color:#e0c3fc; text-shadow:0 0 10px var(--glow-color); animation:pulseText 2s infinite alternate; }
#contentFrame { width:100%; height:100%; border:none; display:none; z-index:2; }

@keyframes pulseText { 0%{ text-shadow:0 0 10px var(--glow-color),0 0 20px var(--glow-color); } 100%{ text-shadow:0 0 20px var(--glow-color),0 0 40px var(--glow-color); } }
@keyframes glowPulse { 0%{ filter:drop-shadow(0 0 5px var(--glow-color)); box-shadow: 0 0 15px var(--glow-color); } 100%{ filter:drop-shadow(0 0 20px var(--glow-color)); box-shadow: 0 0 35px var(--glow-color); } }
.topBtn { padding:6px 10px; background:transparent; border:1px solid var(--glow-color); color:#e0c3fc; border-radius:6px; cursor:pointer; font-weight:bold; text-shadow:0 0 8px var(--glow-color); transition:0.2s; }
.topBtn:hover { background:var(--glow-color); color:white; box-shadow:0 0 10px var(--glow-color); }
</style>
</head>
<body>

<div id="authOverlay">
  <div id="authBox">
      <h2 id="authTitle">Log In to SSP</h2>
      <div id="authMessage"></div>
      
      <form id="loginForm">
          <input type="text" id="loginUser" class="authInput" placeholder="Username" required>
          <input type="password" id="loginPass" class="authInput" placeholder="Password" required>
          <button type="submit" class="authBtn">Log In</button>
      </form>

      <form id="signupForm" style="display: none;">
          <input type="text" id="signupUser" class="authInput" placeholder="New Username" required>
          <input type="email" id="signupEmail" class="authInput" placeholder="Email Address" required>
          <input type="password" id="signupPass" class="authInput" placeholder="New Password" required>
          <button type="submit" class="authBtn">Create Account</button>
      </form>

      <div id="toggleAuthBtn" class="toggleAuth">Need an account? Sign Up</div>
  </div>
</div>

<canvas id="particleCanvas"></canvas>
<div id="clock"></div>

<div id="topBar">
<h1 id="titleHeader" onclick="goHome()">Shadow Sites Plus</h1>
<button onclick="refreshFrame()" class="topBtn">Refresh</button>
<button id="logoutBtn" class="topBtn" style="display:none; border-color: red;">Log Out</button>
</div>

<div id="adminDashboard">
    <h1>System Override: Admin Controls</h1>
    <table class="adminTable">
        <thead>
            <tr>
                <th>Username</th>
                <th>Email</th>
                <th>Status</th>
                <th>Online</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="adminUserTableBody">
            </tbody>
    </table>
</div>

<div id="mainContent">
    <div id="homeContent">
        <h2>Welcome to SSP</h2>
        <h2>Status: Secure Connection.</h2>
    </div>
    <iframe id="contentFrame"></iframe>
</div>

<script>
(function(){

const authOverlay = document.getElementById('authOverlay');
const loginForm = document.getElementById('loginForm');
const signupForm = document.getElementById('signupForm');
const toggleAuthBtn = document.getElementById('toggleAuthBtn');
const authTitle = document.getElementById('authTitle');
const authMessage = document.getElementById('authMessage');
const logoutBtn = document.getElementById('logoutBtn');
const adminDashboard = document.getElementById('adminDashboard');
const mainContent = document.getElementById('mainContent');

let isLoginMode = true;
let heartbeatInterval;

// Check Login & Role via JWT Payload decoding
function checkLoginStatus() {
    const token = localStorage.getItem('token');
    const role = localStorage.getItem('role');
    
    if (token) {
        authOverlay.style.display = 'none';
        logoutBtn.style.display = 'block';
        
        if (role === 'admin') {
            mainContent.style.display = 'none';
            adminDashboard.style.display = 'block';
            loadAdminData();
        } else {
            mainContent.style.display = 'block';
            adminDashboard.style.display = 'none';
            startHeartbeat();
        }
    } else {
        authOverlay.style.display = 'flex';
        logoutBtn.style.display = 'none';
        adminDashboard.style.display = 'none';
        clearInterval(heartbeatInterval);
    }
}
checkLoginStatus();

toggleAuthBtn.addEventListener('click', () => {
    isLoginMode = !isLoginMode;
    authMessage.innerText = "";
    if (isLoginMode) {
        loginForm.style.display = 'block';
        signupForm.style.display = 'none';
        authTitle.innerText = 'Log In to SSP';
        toggleAuthBtn.innerText = 'Need an account? Sign Up';
    } else {
        loginForm.style.display = 'none';
        signupForm.style.display = 'block';
        authTitle.innerText = 'Create SSP Account';
        toggleAuthBtn.innerText = 'Already have an account? Log In';
    }
});

// Login
loginForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('loginUser').value;
    const password = document.getElementById('loginPass').value;
    authMessage.innerText = "Authenticating...";

    try {
        const response = await fetch('/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        });
        const data = await response.json();
        
        if (data.token) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('role', data.role);
            authMessage.innerText = "Access Granted.";
            setTimeout(checkLoginStatus, 500);
        } else {
            authMessage.innerText = data.error;
        }
    } catch (err) {
        authMessage.innerText = "Server error. Try again later.";
    }
});

// Sign Up
signupForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    const username = document.getElementById('signupUser').value;
    const email = document.getElementById('signupEmail').value;
    const password = document.getElementById('signupPass').value;
    authMessage.innerText = "Registering...";

    try {
        const response = await fetch('/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });
        const data = await response.json();
        
        if (response.ok) {
            authMessage.innerText = data.message;
            setTimeout(() => toggleAuthBtn.click(), 2500);
        } else {
            authMessage.innerText = data.error;
        }
    } catch (err) {
        authMessage.innerText = "Server error. Try again later.";
    }
});

logoutBtn.addEventListener('click', () => {
    localStorage.removeItem('token');
    localStorage.removeItem('role');
    authMessage.innerText = "Logged out securely.";
    checkLoginStatus();
});

// --- ADMIN SYSTEM ---
async function loadAdminData() {
    const token = localStorage.getItem('token');
    const response = await fetch('/admin/users', {
        headers: { 'Authorization': `Bearer ${token}` }
    });
    const users = await response.json();
    const tbody = document.getElementById('adminUserTableBody');
    tbody.innerHTML = '';

    users.forEach(user => {
        const statusText = user.is_banned ? 'BANNED' : (user.is_approved ? 'Approved' : 'Pending');
        const onlineBadge = user.is_online ? `<span class="statusBadge online">Online</span>` : `<span class="statusBadge offline">Offline</span>`;
        
        let actionButtons = '';
        if (!user.is_approved) actionButtons += `<button class="adminActionBtn btn-approve" onclick="adminAction(${user.id}, 'approve')">Approve</button>`;
        if (!user.is_banned) actionButtons += `<button class="adminActionBtn btn-ban" onclick="adminAction(${user.id}, 'ban')">Ban</button>`;
        if (user.is_banned) actionButtons += `<button class="adminActionBtn btn-unban" onclick="adminAction(${user.id}, 'unban')">Unban</button>`;

        tbody.innerHTML += `
            <tr>
                <td>${user.username}</td>
                <td>${user.email}</td>
                <td>${statusText}</td>
                <td>${onlineBadge}</td>
                <td>${actionButtons}</td>
            </tr>
        `;
    });
}

window.adminAction = async function(userId, action) {
    const token = localStorage.getItem('token');
    await fetch('/admin/action', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
        body: JSON.stringify({ userId, action })
    });
    loadAdminData(); // Refresh table
};

// --- HEARTBEAT PING (Tracks Online Users) ---
function startHeartbeat() {
    const token = localStorage.getItem('token');
    // Ping the server right away, and then every 30 seconds
    fetch('/heartbeat', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }});
    heartbeatInterval = setInterval(() => {
        fetch('/heartbeat', { method: 'POST', headers: { 'Authorization': `Bearer ${token}` }});
    }, 30000);
}

// Visuals
const clock = document.getElementById('clock');
function updateClock(){
  const now = new Date();
  let h = now.getHours();
  const m = String(now.getMinutes()).padStart(2,'0');
  const s = String(now.getSeconds()).padStart(2,'0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  clock.textContent = `${h}:${m}:${s} ${ampm}`;
}
setInterval(updateClock, 1000);
updateClock();

window.goHome = function() {
    document.getElementById('contentFrame').style.display = "none";
    document.getElementById('homeContent').style.display = "block";
};
window.refreshFrame = function() {
    const frame = document.getElementById('contentFrame');
    if(frame.style.display === "block") frame.src = frame.src;
};

// Particles Background Script 
const canvas = document.getElementById('particleCanvas');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
let particles = [];
function spawnParticle() {
  particles.push({
    x: Math.random() * canvas.width, y: canvas.height,
    size: 2 + Math.random() * 5, speed: 0.5 + Math.random() * 1,
    opacity: 0.2 + Math.random() * 0.5
  });
  if (particles.length > 100) particles.shift();
}
function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach((p, i) => {
      p.y -= p.speed;
      ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--glow-color').trim();
      ctx.globalAlpha = p.opacity;
      ctx.fillRect(p.x, p.y, p.size, p.size);
      if(p.y < 0) particles.splice(i, 1);
  });
  spawnParticle();
  requestAnimationFrame(animate);
}
animate();

})();
</script>
</body>
</html>
