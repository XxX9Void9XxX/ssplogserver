<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Secure App</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        form { margin-bottom: 20px; }
        input { display: block; margin-bottom: 10px; padding: 8px; }
        #message { font-weight: bold; color: blue; margin-top: 20px; }
    </style>
</head>
<body>

    <h2>Sign Up</h2>
    <form id="signupForm">
        <input type="text" id="signupUser" placeholder="Username" required>
        <input type="password" id="signupPass" placeholder="Password" required>
        <button type="submit">Create Account</button>
    </form>

    <h2>Log In</h2>
    <form id="loginForm">
        <input type="text" id="loginUser" placeholder="Username" required>
        <input type="password" id="loginPass" placeholder="Password" required>
        <button type="submit">Log In</button>
    </form>

    <div id="message"></div>
    <button id="logoutBtn" style="display:none; margin-top: 10px;">Log Out</button>

    <script src="app.js"></script> 
</body>
</html>
